<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LCC Assembly — Playground</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --border:    #30363d;
      --text:      #c9d1d9;
      --muted:     #8b949e;
      --accent:    #58a6ff;
      --error:     #f85149;
      --radius:    8px;
      --font-code: "JetBrains Mono", "Fira Code", Consolas, "Courier New", monospace;
      --font-ui:   -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      --term-bg:   #0a0a0a;
      --term-fg:   #4af626;
      --term-err:  #ff5555;
    }

    html { background: var(--bg); color: var(--text); font-family: var(--font-ui); }
    body { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

    /* ── Header ───────────────────────────────────────────── */
    header {
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1.75rem;
    }
    header h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.3rem; }
    header p  { color: var(--muted); font-size: 0.9rem; line-height: 1.5; }
    header a, footer a { color: var(--accent); text-decoration: none; }
    header a:hover, footer a:hover { text-decoration: underline; }

    /* ── Run bar ──────────────────────────────────────────── */
    .run-bar {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.5rem;
      flex-wrap: wrap;
    }
    #run-btn, #format-btn, #download-btn, #share-btn {
      border: none;
      border-radius: 6px;
      padding: 0.4rem 1.1rem;
      font-size: 0.9rem;
      font-weight: 700;
      cursor: pointer;
      font-family: var(--font-ui);
    }
    #run-btn { background: var(--accent); color: #000; }
    #run-btn:hover    { opacity: 0.88; }
    #run-btn:disabled { opacity: 0.45; cursor: default; }
    #format-btn { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
    #format-btn:hover { border-color: var(--accent); color: var(--accent); }
    #download-btn { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
    #download-btn:hover { border-color: var(--accent); color: var(--accent); }
    #share-btn { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
    #share-btn:hover { border-color: var(--accent); color: var(--accent); }
    .filename-label, .stdin-label {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.82rem;
      color: var(--muted);
      white-space: nowrap;
    }
    #filename-input {
      width: 12ch;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.3rem 0.6rem;
      font-family: var(--font-code);
      font-size: 0.82rem;
    }
    #filename-input.invalid { border-color: var(--error); }
    #filename-input::placeholder { color: var(--muted); }
    #stdin-input {
      flex: 1;
      min-width: 120px;
      max-width: 320px;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.3rem 0.6rem;
      font-family: var(--font-code);
      font-size: 0.82rem;
    }
    #stdin-input::placeholder { color: var(--muted); }
    #run-status {
      font-size: 0.8rem;
      color: var(--error);
      flex: 1;
    }

    /* ── Tab bar ──────────────────────────────────────────── */
    .tab-bar {
      display: flex;
      align-items: flex-end;
      gap: 3px;
      padding: 0.4rem 0 0;
    }
    .tab {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      background: var(--bg);
      color: var(--muted);
      border: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      border-radius: 6px 6px 0 0;
      padding: 0.3rem 0.7rem;
      font-size: 0.8rem;
      font-family: var(--font-code);
      cursor: pointer;
      user-select: none;
      transition: color 0.1s;
      position: relative;
      bottom: -1px;
    }
    .tab:hover { color: var(--text); }
    .tab.active {
      background: var(--surface);
      color: var(--text);
      border-color: var(--border);
      border-bottom-color: var(--surface);
      z-index: 1;
    }
    .tab-close {
      font-size: 0.9rem;
      line-height: 1;
      color: var(--muted);
      border-radius: 3px;
      padding: 0 1px;
    }
    .tab-close:hover { color: var(--error); }
    .tab-new {
      background: none;
      border: 1px solid transparent;
      border-radius: 6px;
      color: var(--muted);
      font-size: 1rem;
      padding: 0.1rem 0.5rem 0.2rem;
      cursor: pointer;
      font-family: var(--font-ui);
      align-self: center;
      line-height: 1;
    }
    .tab-new:hover { color: var(--accent); border-color: var(--border); }

    /* ── CodeMirror editor ───────────────────────────────── */
    #cm-editor {
      border: 1px solid var(--border);
      border-radius: 0 var(--radius) var(--radius) var(--radius);
      overflow: hidden;
      margin-bottom: 1rem;
    }
    /* Override CM6 internals to match theme */
    .cm-editor {
      background: var(--surface) !important;
      height: 300px;
      font-family: var(--font-code) !important;
      font-size: 0.875rem !important;
    }
    .cm-editor.cm-focused { outline: none !important; }
    .cm-focused .cm-selectionBackground,
    .cm-selectionBackground { background: #264f78 !important; }
    .cm-scroller { overflow: auto; font-family: inherit !important; }
    .cm-content { padding: 1rem 0.25rem !important; caret-color: var(--text); }
    .cm-line { color: var(--text); }
    .cm-gutters {
      background: var(--surface) !important;
      border-right: 1px solid var(--border) !important;
      color: var(--muted) !important;
    }
    .cm-activeLineGutter { background: #1f2937 !important; }
    .cm-activeLine { background: #1f2937 !important; }
    .cm-cursor { border-left-color: var(--text) !important; }

    /* ── LCC syntax tokens ────────────────────────────────── */
    .lcc-comment   { color: #6e7681; font-style: italic; }
    .lcc-keyword   { color: #ff7b72; font-weight: 600; }
    .lcc-register  { color: #ffa657; }
    .lcc-directive { color: #d2a8ff; }
    .lcc-string    { color: #a5d6ff; }
    .lcc-number    { color: #79c0ff; }
    .lcc-label     { color: #e3b341; }
    .lcc-varname   { color: var(--text); }

    /* ── Terminal output ─────────────────────────────────── */
    .panel-label {
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 0.35rem;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }
    #exec-output {
      width: 100%;
      min-height: 160px;
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      background: var(--term-bg);
      color: var(--term-fg);
      font-family: var(--font-code);
      font-size: 0.875rem;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
      overflow: auto;
    }
    #exec-output.lcc-error { color: var(--term-err); }
    #exec-output.idle      { color: var(--muted); font-style: italic; }

    /* ── Footer ──────────────────────────────────────────── */
    footer {
      margin-top: 2.5rem;
      padding-top: 1.25rem;
      border-top: 1px solid var(--border);
      font-size: 0.78rem;
      color: var(--muted);
    }
  </style>

  <!-- Execution engine — must be built first: npm run build:browser -->
  <script src="../../dist/lcc.bundle.js"></script>
</head>
<body>

<header>
  <h1>LCC Assembly Playground</h1>
  <p>
    Write LCC assembly, click <strong>Run</strong>, and see the output.
    Editor powered by <a href="https://codemirror.net" target="_blank" rel="noopener">CodeMirror 6</a>.
    Execution via <a href="https://github.com/avidrucker/lccjs" target="_blank" rel="noopener">lccjs</a>
    (<code>dist/lcc.bundle.js</code> — run <code>npm run build:browser</code> once).
  </p>
</header>

<main>

  <!-- Run bar -->
  <div class="run-bar">
    <button id="run-btn">▶ Run</button>
    <button id="format-btn" title="Normalise indentation (labels at col 0, instructions indented 8 spaces)">⌥ Format</button>
    <button id="download-btn" title="Download current file as .a">Download</button>
    <button id="share-btn" title="Copy shareable link to clipboard">Share</button>
    <label class="filename-label">
      file
      <input id="filename-input" type="text" value="untitled-1.a"
             spellcheck="false" autocomplete="off" autocorrect="off"
             aria-label="Assembly filename" />
    </label>
    <span class="stdin-label">
      stdin
      <input id="stdin-input" type="text" placeholder="one line per entry — separate with ↵" />
    </span>
    <span id="run-status"></span>
  </div>

  <!-- Tab bar -->
  <div class="tab-bar" id="tab-bar"></div>

  <!-- CodeMirror editor -->
  <div id="cm-editor"></div>

  <!-- Terminal output -->
  <p class="panel-label">Output</p>
  <pre id="exec-output" class="idle">(click Run to execute)</pre>

</main>

<footer>
  <a href="../showcase/index.html">Showcase</a> ·
  <a href="https://github.com/avidrucker/lccjs" target="_blank" rel="noopener">avidrucker/lccjs</a>
</footer>

<script type="module">

import { EditorView, keymap, ViewPlugin, Decoration } from 'https://esm.sh/@codemirror/view@6?deps=@codemirror/state@6';
import { EditorState, RangeSetBuilder }               from 'https://esm.sh/@codemirror/state@6';
import { basicSetup }                                  from 'https://esm.sh/@codemirror/basic-setup@0.20?deps=@codemirror/state@6';
import { indentWithTab }                               from 'https://esm.sh/@codemirror/commands@6?deps=@codemirror/state@6';

// ── LCC assembly syntax highlighting (ViewPlugin + Decoration) ────────────────

const _LCC_MNEMONICS = new Set([
  'br','bral','brz','bre','brnz','brne','brn','brp','brlt','brgt','brc','brb',
  'mov','mvi','mvr',
  'add','sub','cmp','and','not','or','xor','sext','mul','div','rem',
  'srl','sra','sll','rol','ror',
  'push','pop',
  'ld','st','ldr','str','lea','cea',
  'call','jsr','bl','jsrr','blr','jmp','ret',
  'halt','nl',
  'dout','udout','hout','aout','sout','din','hin','ain','sin',
  'm','r','s','bp',
  // LCC+
  'clear','sleep','nbain','cursor','srand','rand','millis','resetc',
]);

const _LCC_REGISTERS = new Set(['r0','r1','r2','r3','r4','r5','r6','r7','fp','sp','lr']);

function _tokenizeLccLine(text) {
  const tokens = [];
  let i = 0;
  const n = text.length;
  while (i < n) {
    if (/\s/.test(text[i])) { i++; continue; }

    if (text[i] === ';') {
      tokens.push({ start: i, end: n, cls: 'lcc-comment' });
      break;
    }

    if (text[i] === '"') {
      let j = i + 1;
      while (j < n) { if (text[j] === '\\') { j += 2; } else if (text[j] === '"') { j++; break; } else j++; }
      tokens.push({ start: i, end: j, cls: 'lcc-string' });
      i = j; continue;
    }

    let m;
    if ((m = text.slice(i).match(/^'(?:\\.|[^\\])'/))) {
      tokens.push({ start: i, end: i + m[0].length, cls: 'lcc-string' });
      i += m[0].length; continue;
    }
    if ((m = text.slice(i).match(/^\.\w+/))) {
      tokens.push({ start: i, end: i + m[0].length, cls: 'lcc-directive' });
      i += m[0].length; continue;
    }
    if ((m = text.slice(i).match(/^0[xX][0-9a-fA-F]+/))) {
      tokens.push({ start: i, end: i + m[0].length, cls: 'lcc-number' });
      i += m[0].length; continue;
    }
    if ((m = text.slice(i).match(/^-?\d+/))) {
      tokens.push({ start: i, end: i + m[0].length, cls: 'lcc-number' });
      i += m[0].length; continue;
    }
    if ((m = text.slice(i).match(/^[a-zA-Z_$][a-zA-Z0-9_$]*/))) {
      const word = m[0].toLowerCase();
      const end  = i + m[0].length;
      const isLabelDef = /^\s*:/.test(text.slice(end));
      let cls;
      if (isLabelDef)                  cls = 'lcc-label';
      else if (_LCC_REGISTERS.has(word)) cls = 'lcc-register';
      else if (_LCC_MNEMONICS.has(word)) cls = 'lcc-keyword';
      else                               cls = 'lcc-varname';
      tokens.push({ start: i, end, cls });
      i = end; continue;
    }
    i++;
  }
  return tokens;
}

function _buildLccDecorations(view) {
  const builder = new RangeSetBuilder();
  for (const { from, to } of view.visibleRanges) {
    let pos = from;
    while (pos <= to) {
      const line = view.state.doc.lineAt(pos);
      for (const tok of _tokenizeLccLine(line.text)) {
        builder.add(line.from + tok.start, line.from + tok.end,
          Decoration.mark({ class: tok.cls }));
      }
      pos = line.to + 1;
    }
  }
  return builder.finish();
}

const lccHighlighter = ViewPlugin.fromClass(
  class {
    constructor(view) { this.decorations = _buildLccDecorations(view); }
    update(u) {
      if (u.docChanged || u.viewportChanged) this.decorations = _buildLccDecorations(u.view);
    }
  },
  { decorations: v => v.decorations },
);

// ── Starter code ─────────────────────────────────────────────────────────────

const STARTER = `\
; Hello, World!
        lea r0, msg
        sout r0
        nl
        halt
msg:    .string "Hello, World!"`;

// ── DOM refs ──────────────────────────────────────────────────────────────────

const tabBarEl   = document.getElementById('tab-bar');
const cmEditorEl = document.getElementById('cm-editor');
const stdinEl    = document.getElementById('stdin-input');
const runBtn     = document.getElementById('run-btn');
const formatBtn  = document.getElementById('format-btn');
const runStatus  = document.getElementById('run-status');
const execOut    = document.getElementById('exec-output');
const filenameEl = document.getElementById('filename-input');

// ── Filename validation ───────────────────────────────────────────────────────

function isValidFilename(name) {
  return name.length > 0 && /\.a$/i.test(name) && !/[/\\:\0]/.test(name);
}

// ── URL share helpers ─────────────────────────────────────────────────────────

function encodeForUrl(src) {
  return btoa(encodeURIComponent(src));
}

function decodeFromUrl(encoded) {
  try { return decodeURIComponent(atob(encoded)); } catch { return null; }
}

function syncUrlToEditor() {
  const src = view.state.doc.toString();
  const url = new URL(window.location.href);
  url.searchParams.set('code', encodeForUrl(src));
  history.replaceState(null, '', url.toString());
}

// ── CodeMirror setup ──────────────────────────────────────────────────────────

const baseExtensions = [
  basicSetup,
  lccHighlighter,
  keymap.of([indentWithTab]),
  EditorView.theme({
    '&': { height: '300px' },
    '.cm-scroller': { overflow: 'auto' },
  }),
  EditorView.updateListener.of((update) => {
    if (update.docChanged) syncUrlToEditor();
  }),
];

function makeState(doc) {
  return EditorState.create({ doc: doc ?? '', extensions: baseExtensions });
}

const _urlCode = new URLSearchParams(window.location.search).get('code');
const _initialDoc = _urlCode ? (decodeFromUrl(_urlCode) ?? STARTER) : STARTER;
const view = new EditorView({ state: makeState(_initialDoc), parent: cmEditorEl });

// ── Tab model ─────────────────────────────────────────────────────────────────

// Each entry: { name: string, state: EditorState, initialDoc: string }
let tabs      = [{ name: 'untitled-1.a', state: view.state, initialDoc: _initialDoc }];
let activeIdx = 0;
let tabCounter = 1;

function escHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function renderTabs() {
  tabBarEl.innerHTML = '';
  tabs.forEach((tab, i) => {
    const btn = document.createElement('button');
    btn.className = 'tab' + (i === activeIdx ? ' active' : '');
    btn.dataset.idx = i;

    const nameSpan = document.createElement('span');
    nameSpan.textContent = tab.name;
    btn.appendChild(nameSpan);

    if (tabs.length > 1) {
      const closeSpan = document.createElement('span');
      closeSpan.className = 'tab-close';
      closeSpan.textContent = '×';
      closeSpan.title = 'Close tab';
      closeSpan.addEventListener('click', (e) => { e.stopPropagation(); closeTab(i); });
      btn.appendChild(closeSpan);
    }

    btn.addEventListener('click', () => switchTab(i));
    tabBarEl.appendChild(btn);
  });

  const newBtn = document.createElement('button');
  newBtn.className = 'tab-new';
  newBtn.textContent = '+';
  newBtn.title = 'New tab';
  newBtn.addEventListener('click', addTab);
  tabBarEl.appendChild(newBtn);
}

function syncFilenameInput() {
  filenameEl.value = tabs[activeIdx].name;
  filenameEl.classList.toggle('invalid', !isValidFilename(tabs[activeIdx].name));
}

function switchTab(idx) {
  if (idx === activeIdx) return;
  tabs[activeIdx].state = view.state;          // snapshot current edits
  activeIdx = idx;
  view.setState(tabs[activeIdx].state);        // restore target buffer
  renderTabs();
  syncFilenameInput();
  view.focus();
}

function addTab(doc) {
  tabs[activeIdx].state = view.state;          // snapshot before switching
  tabCounter += 1;
  const name  = `untitled-${tabCounter}.a`;
  const docStr = typeof doc === 'string' ? doc : '';
  tabs.push({ name, state: makeState(docStr), initialDoc: docStr });
  activeIdx = tabs.length - 1;
  view.setState(tabs[activeIdx].state);
  renderTabs();
  syncFilenameInput();
  view.focus();
}

function closeTab(idx) {
  const tab     = idx === activeIdx ? { ...tabs[idx], state: view.state } : tabs[idx];
  const content = tab.state.doc.toString();
  if (content.trim() !== '' && content !== tab.initialDoc) {
    if (!confirm(`Close "${tab.name}"? Unsaved changes will be lost.`)) return;
  }
  tabs.splice(idx, 1);
  if (activeIdx >= tabs.length) activeIdx = tabs.length - 1;
  if (idx <= activeIdx && idx !== 0) activeIdx = Math.max(0, activeIdx - 1);
  view.setState(tabs[activeIdx].state);
  renderTabs();
  syncFilenameInput();
  view.focus();
}

// ── Filename input → active tab name ─────────────────────────────────────────

filenameEl.addEventListener('input', () => {
  const v = filenameEl.value.trim();
  const valid = isValidFilename(v);
  filenameEl.classList.toggle('invalid', !valid);
  if (valid) {
    tabs[activeIdx].name = v;
    renderTabs();
  }
});

// ── Execution ─────────────────────────────────────────────────────────────────

function getApi() {
  return (typeof window !== 'undefined' && window.lcc) ? window.lcc : null;
}

function run() {
  const api = getApi();
  if (!api) {
    execOut.className   = 'lcc-error';
    execOut.textContent = 'lcc.bundle.js not loaded.\nRun: npm run build:browser';
    return;
  }

  const src        = view.state.doc.toString();
  const stdinLines = stdinEl.value.trim()
    ? stdinEl.value.split(/\r?\n/)
    : [];

  runStatus.textContent = '';
  execOut.classList.remove('lcc-error', 'idle');
  execOut.textContent   = 'Running…';
  runBtn.disabled       = true;

  setTimeout(() => {
    try {
      const asmResult = api.assemble(src);
      if (!asmResult.ok) {
        execOut.className   = 'lcc-error';
        execOut.textContent = 'Assembly error:\n' + asmResult.errors;
        runBtn.disabled     = false;
        return;
      }

      const runResult = api.run(asmResult.binary, {
        stdin:    stdinLines,
        maxSteps: 50000,
      });

      execOut.textContent = runResult.stdout || '(no output)';
      execOut.className   = '';

      if (runResult.maxStepsReached) {
        runStatus.textContent = 'Program did not halt — possible infinite loop';
        execOut.className     = 'lcc-error';
      } else if (runResult.exitCode !== 0) {
        runStatus.textContent = `exited with code ${runResult.exitCode}`;
      }
    } catch (err) {
      execOut.className   = 'lcc-error';
      execOut.textContent = 'Runtime error:\n' + err.message;
    } finally {
      runBtn.disabled = false;
    }
  }, 0);
}

runBtn.addEventListener('click', run);

// Ctrl/Cmd+Enter anywhere in the editor → run
view.dom.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    e.preventDefault();
    run();
  }
});

// ── Format ────────────────────────────────────────────────────────────────────

formatBtn.addEventListener('click', () => {
  const api = getApi();
  if (!api || typeof api.formatLccSource !== 'function') {
    runStatus.textContent = 'Formatter unavailable — rebuild lcc.bundle.js (npm run build:browser)';
    return;
  }
  const formatted = api.formatLccSource(view.state.doc.toString());
  view.dispatch({
    changes: { from: 0, to: view.state.doc.length, insert: formatted },
  });
  runStatus.textContent = '';
});

// ── Download ──────────────────────────────────────────────────────────────────

document.getElementById('download-btn').addEventListener('click', () => {
  const content = view.state.doc.toString();
  const name = isValidFilename(filenameEl.value) ? filenameEl.value : 'program.a';
  const blob = new Blob([content], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = name;
  a.click();
  URL.revokeObjectURL(url);
});

// ── Share ─────────────────────────────────────────────────────────────────────

document.getElementById('share-btn').addEventListener('click', () => {
  syncUrlToEditor();
  const shareUrl = window.location.href;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(shareUrl).then(() => {
      runStatus.textContent = 'Link copied to clipboard';
      setTimeout(() => { runStatus.textContent = ''; }, 2500);
    }).catch(() => {
      prompt('Copy this link:', shareUrl);
    });
  } else {
    prompt('Copy this link:', shareUrl);
  }
});

// ── Init ──────────────────────────────────────────────────────────────────────

renderTabs();

</script>

</body>
</html>
