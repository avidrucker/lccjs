name: Auto-label issues by area

# Structural enforcement at creation time: any issue opened without an `area:*`
# label gets one INFERRED from its content (title + body), falling back to
# `area:uncategorized` only when no rule confidently matches. This keeps
# uncategorized the rare exception it was designed to be rather than the default
# (#1246), while preserving the #1012 floor and the #1151 claim-gate semantics.
# Cannot be bypassed by direct `gh issue create`, since the runner reacts to the
# `issues: opened` event.
#
# The inference logic lives in scripts/infer-area-label.js (pure, unit-tested in
# tests/new/infer-area-label.unit.spec.js) — this workflow is a thin shim that
# requires it, so the heuristic can be tuned without editing YAML.

on:
  issues:
    types: [opened]

permissions:
  issues: write
  contents: read # actions/checkout needs read access to fetch the inference script

jobs:
  label-area:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo (for scripts/infer-area-label.js)
        uses: actions/checkout@v4

      - name: Infer and apply an area:* label when none is present
        uses: actions/github-script@v7
        with:
          script: |
            const { inferArea } = require(`${process.env.GITHUB_WORKSPACE}/scripts/infer-area-label.js`);
            const issue = context.payload.issue;
            const labels = issue.labels || [];
            const hasArea = labels.some(
              (l) => (typeof l === 'string' ? l : l.name).startsWith('area:')
            );
            if (hasArea) {
              core.info(`#${issue.number} already has an area:* label — nothing to do.`);
              return;
            }
            const area = inferArea(issue.title || '', issue.body || '', labels);
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: [area],
            });
            core.info(`Applied ${area} to #${issue.number} (inferred from content).`);
